<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-black.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rohan Jose — Designer</title>
    <script>
      // iOS 26 Safari ignores <meta name="theme-color"> entirely. It tints the
      // status bar ("forehead") and toolbar ("chin") from the background-color
      // of the topmost position:fixed/sticky element flush with each viewport
      // edge, and only falls back to <body>'s background-color.
      //
      // The catch that made every previous attempt look like a no-op: the body
      // fallback is read ONCE, at first paint. Safari deliberately ignores later
      // JS changes to it, so re-colouring on route change can never re-tint —
      // in an SPA there is no second first paint, and every client-side
      // navigation kept the entry route's bars (enter on '/', and /resume shows
      // that route's light bars over its black page).
      //
      // The fixed-element channel *is* live: an element entering the render tree
      // re-tints. That is what <BarTint> uses (see src/components/ui/BarTint.tsx).
      // The values below decide first paint — for a deep link, and as the base
      // the strips then confirm.
      ;(function () {
        // top/bottom default to bg; they differ only where the page's own two
        // edges differ (contact: light form surface up top, shader band below).
        var PAGES = {
          '/': { bg: '#eef0f2', scheme: 'light' },
          '/models': { bg: '#d0d0d0', scheme: 'light' },
          '/about': { bg: '#d8d7d7', scheme: 'light' },
          '/projects': { bg: '#000000', scheme: 'dark' },
          '/contact': { bg: '#0b0b0b', top: '#e9ebed', scheme: 'dark' },
          '/resume': { bg: '#000000', scheme: 'dark' },
        }
        window.__pageTint = function (path) {
          var p = PAGES[path.replace(/\/+$/, '') || '/'] || PAGES['/']
          return { bg: p.bg, top: p.top || p.bg, bottom: p.bottom || p.bg, scheme: p.scheme }
        }
        window.__pageTheme = function (path) {
          var tint = window.__pageTint(path)
          var el = document.documentElement
          el.style.setProperty('--page-bg', tint.bg)
          el.style.colorScheme = tint.scheme
        }
        window.__pageTheme(location.pathname)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
