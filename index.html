<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-black.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rohan Jose — Designer</title>
    <script>
      // iOS 26 Safari ignores <meta name="theme-color"> entirely. It derives the
      // status-bar ("forehead") and toolbar ("chin") tint by sampling
      // position:fixed/sticky elements near the viewport edges, falling back to
      // the html/body background — and it samples at FIRST PAINT, ignoring later
      // JS colour changes. React hasn't mounted then, so no page backdrop exists
      // yet and the whole document is whatever the stylesheet says: previously a
      // dark --bg, which is why every route rendered black bars. Painting content
      // under the bars (viewport-fit=cover, 100lvh backdrops) can't fix this —
      // Safari draws its own opaque bar over that content. Setting the route's
      // real colour here, before <body> exists, is what actually decides them.
      window.__pageTheme = function (path) {
        var PAGES = {
          '/': ['#eef0f2', 'light'],
          '/models': ['#d0d0d0', 'light'],
          '/about': ['#d8d7d7', 'light'],
          '/projects': ['#000000', 'dark'],
          '/contact': ['#0b0b0b', 'dark'],
          '/resume': ['#000000', 'dark'],
        }
        var page = PAGES[path.replace(/\/+$/, '') || '/'] || PAGES['/']
        var el = document.documentElement
        el.style.setProperty('--page-bg', page[0])
        el.style.colorScheme = page[1]
      }
      window.__pageTheme(location.pathname)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
